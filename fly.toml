# Deploy with:
#   fly launch --no-deploy
#   fly secrets set DATABASE_URL=... JWT_SECRET=... GEMINI_API_KEY=...
#   fly deploy
app = "vastra"
primary_region = "bom"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[env]
  PORT = "3000"
  NEXT_PUBLIC_APP_URL = "https://vastra.fly.dev"
